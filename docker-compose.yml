version: '3.8'

services:
  db:
    image: postgres:16
    container_name: telecrm_db
    restart: always
    environment:
      POSTGRES_USER: telecrm
      POSTGRES_PASSWORD: telecrm_password
      POSTGRES_DB: telecrm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: telecrm_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@telecrm.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  pgdata:
