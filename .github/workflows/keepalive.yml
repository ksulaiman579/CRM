name: Keep backend awake

# Pings the Render backend's /health every ~10 minutes so the free-tier
# service doesn't sleep (avoids cold-start delays and keeps the in-process
# call generator running). Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS https://telecom-crm-api.onrender.com/health || true
